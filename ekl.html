<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Controle Diario</title>
    <style>
        * {
          background: #073753;
          box-sizing: border-box;
         .btn-modif1: 0;
           padding: 0;
        }

        body {
            background: #04273f;
            /* O fundo do frame agora é o fundo do body */
            font-family: Arial, Helvetica, sans-serif, sans-serif;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            /* padding: 20px; <--- REMOVA OU COMENTE ESTA LINHA */
            /* O padding agora será aplicado diretamente no conteúdo */
            color: #be2121;
            /* A cor do texto do frame agora é a do body */
            flex-direction: column;
            /* Para alinhar o conteúdo verticalmente */
            /* Remova também a largura e bordas que eram do phone-frame */
            width: 100%;
            box-sizing: border-box;
            /* Garante que padding não adicione largura extra */
        }


     .main-app-content {
        padding: 24px 16px 20px;
        max-width: 500px;
        width: 100%;
        /* margin: auto; <--- REMOVA ESTA LINHA */
        box-sizing: border-box;
        display: flex; /* Adiciona flexbox para o conteúdo interno */
        flex-direction: column; /* Organiza os itens em coluna */
        min-height: 100vh; /* Ocupa 100% da altura da tela */
        /* Remova ou ajuste o padding do body se precisar */
        /* gap: 10px; Adiciona um espaçamento entre os elementos filhos, opcional */
    }


        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: px;
            margin: top 0px;
            ;
        }

        .header h1 {
            color: #e0e0e0;
            font-size: 30px;
            font-weight: 600;
            letter-spacing: 0.6px;
        }

        .nav-btn {
            background: none;
            border: #be2121;
            color: #00b4d8;
            font-size: 22px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .nav-btn:hover {
            background: rgba(20, 197, 50, 0.15);
            border: 1px solid #be2121;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .tab-btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 10px;
            background: #0f3460;
            color: #aaa;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: #00b4d8;
            color: #fff;
        }

        /* Total Inicial */
        .total-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .total-row label {
            color: #ccc;
            font-size: 15px;
        }

        .total-input {
            width: 72px;
            text-align: center;
            background: #2a2a4a;
            border: 1.5px solid #00b4d8;
            border-radius: 10px;
            color: #fff;
            font-size: 20px;
            /* Aumentado de 18px para 20px */
            font-weight: 700;
            padding: 8px 8px;
            /* Aumentado o padding */
            outline: none;
        }

        /* Grid */
        .grid-header {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            padding: 6px 4px;
            background: #0f2960;
            border-radius: 8px 8px 0 0;
            margin-bottom: 2px;
        }

        .grid-header span {
            color: #ccc;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
        }

        .grid-body {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .grid-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            align-items: center;
            background: #0c3b79;
            border-radius: 6px;
            padding: 4px 2px;
            transition: background 0.15s;
        }

        .grid-row:nth-child(even) {
            background: #243050;
        }

        .grid-row:hover {
            background: #2e3d6a;
        }

        .grid-row span,
        .grid-row input {
            text-align: center;
            font-size: 18px;
            /* Aumentado de 14px para 16px */
            color: #e0e0e0;
            line-height: 2;
            /* Opcional: aumenta o espaçamento da linha para melhor leitura */
        }

        .cell-input {
            width: 100%;
            background: #2a2a4a;
            border: 1px solid #00b4d8;
            border-radius: 6px;
            color: #fff;
            font-size: 20px;
            /* Aumentado de 14px para 16px */
            text-align: center;
            padding: 5px 4px;
            /* Aumentado o padding para o input ficar maior */
            outline: none;
        }

        .cell-input:focus {
            border-color: #90e0ef;
        }

        .resto-cell {
            color: #90e0ef;
            font-weight: 600;
        }

        .driver-cell {
            color: #aaa;
            font-size: 13px;
        }

        /* Status message */
        #status {
            text-align: center;
            font-size: 12px;
            margin-top: 10px;
            min-height: 18px;
            color: #90e0ef;
        }

        /* Buttons */
        .btn-row {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin-top: 16px;
        }

        .btn-row button {
            flex: 1;
            padding: 10px 4px;
            border: none;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.3px;
        }

        .btn-setdrv {
            background: #0f3460;
            color: #00b4d8;
            border: 1.5px solid #00b4d8;
        }

        .btn-setdrv:hover {
            background: #00b4d8;
            color: #fff;
        }

        .btn-modif1 {
            background: #0f3460;
            color: #90e0ef;
            border: 1.5px solid #90e0ef;
        }

        .btn-modif1:hover {
            background: #90e0ef;
            color: #16213e;
        }

        .btn-modif2 {
            background: #0f3460;
            color: #48cae4;
            border: 1.5px solid #48cae4;
        }

        .btn-modif2:hover {
            background: #48cae4;
            color: #16213e;
        }

        .loading {
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>

<body>


    <div class="main-app-content">
        <!-- Conteúdo do seu app: Header, Tabs, Total Inicial, Grid, Status, Buttons -->
        <div class="header">
            <button class="nav-btn" id="prevDay">&#8592;</button>
            <h1>Controle Diario</h1>
            <button class="nav-btn" id="nextDay">&#8594;</button>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" id="tab-diurno" onclick="switchTab('diurno')">☀️ Diurno</button>
            <button class="tab-btn" id="tab-noturno" onclick="switchTab('noturno')">🌙 Noturno</button>
        </div>

        <!-- Total Inicial -->
        <div class="total-row">
            <label>Total Inicial:</label>
            <input type="number" id="totalInicial" class="total-input" value="40" min="0" />
        </div>

        <!-- Grid Header -->
        <div class="grid-header">
            <span>Horario</span>
            <span>Saida</span>
            <span>Resto</span>
            <span>Driver</span>
        </div>

        <!-- Grid Body -->
        <div class="grid-body" id="gridBody"></div>

        <!-- Status -->
        <div id="status"></div>

        <!-- Buttons -->
        <div class="btn-row">
            <button class="btn-setdrv" onclick="setDriver()">SetDrv</button>
            <button class="btn-modif1">Salvar</button> <!-- REMOVIDO onclick="saveDataToSheet()" -->
            <button class="btn-modif2">Recarregar</button> <!-- REMOVIDO onclick="handleReloadButtonClick()" -->
        </div>

    </div>



    <script>
        // =====================================================
        // CONFIGURE AQUI — substitua pela URL do seu Web App
        // =====================================================
        const SHEET_URL = "https://script.google.com/macros/s/AKfycbxEQG9FV7JlGDQtfshTT6y1NOa2zjgsAu2fHoXCMtf7x8fbEUmxmaTAkU58yvGNskMg/exec";
        // =====================================================
        const LOCAL_STORAGE_KEY_DATA = "controleDiarioData";
        const LOCAL_STORAGE_KEY_TOTAL = "controleDiarioTotalInicial";

        const HORARIOS_DIURNO = ["5:35", "5:35", "6:05", "6:35", "7:05", "7:15","7:35", "8:05", "8:35", "9:05"];
        const HORARIOS_NOTURNO = ["17:00", "17:30", "18:00", "18:30", "19:00", "19:30", "20:00", "20:30", "21:00", "21:30", "22:00", "22:30"];

        let currentTab = "diurno";
        let rowData = {};   // { tab: [{saida, driver}, ...] }

        function horarios() {
            return currentTab === "diurno" ? HORARIOS_DIURNO : HORARIOS_NOTURNO;
        }

        // ---- Build grid ----
        function buildGrid(data) {
            const body = document.getElementById("gridBody");
            body.innerHTML = "";
            const hrs = horarios();
            const total = parseInt(document.getElementById("totalInicial").value) || 40;
            let prevResto = total;

            hrs.forEach((h, i) => {
                const row = document.createElement("div");
                row.className = "grid-row";

                const saida = (data && data[i]) ? (data[i].saida ?? "") : "";
                const driver = (data && data[i]) ? (data[i].driver ?? "") : "";
                let resto = "";
                if (saida !== "") {
                    prevResto = prevResto - (parseInt(saida) || 0);
                    resto = prevResto;
                }

                row.innerHTML = `
        <span>${h}</span>
        <input class="cell-input saida-input" data-index="${i}" type="number" value="${saida}" min="0" placeholder="-" />
        <span class="resto-cell" id="resto-${i}">${resto}</span>
        <span class="driver-cell" id="driver-${i}">${driver}</span>
      `;
                body.appendChild(row);
            });

            // Live update Resto + estampa driver ao digitar Saida
            document.querySelectorAll(".saida-input").forEach(inp => {
                inp.addEventListener("input", () => {
                    updateResto();
                    const i = inp.dataset.index;
                    const driverEl = document.getElementById(`driver-${i}`);
                    if (inp.value !== "") {
                        const name = localStorage.getItem("driverName") || "";
                        driverEl.textContent = name;
                    } else {
                        driverEl.textContent = "";
                    }
                });
            });
            document.getElementById("totalInicial").addEventListener("input", () => updateResto());
        }

        function updateResto() {
            const total = parseInt(document.getElementById("totalInicial").value) || 0;
            let prevResto = total;
            document.querySelectorAll(".saida-input").forEach(inp => {
                const i = inp.dataset.index;
                const v = inp.value;
                const el = document.getElementById(`resto-${i}`);
                if (v !== "") {
                    prevResto = prevResto - (parseInt(v) || 0);
                    el.textContent = prevResto;
                } else {
                    el.textContent = "";
                }
            });
        }

        // Função para coletar todos os dados da grid atual
        function gatherRows() {
            const rows = [];
            const hrs = horarios();
            hrs.forEach((h, i) => {
                const saida = document.querySelector(`.saida-input[data-index="${i}"]`)?.value ?? "";
                const driver = document.getElementById(`driver-${i}`)?.textContent ?? "";
                rows.push({ horario: h, saida, driver });
            });
            return rows;
        }

        // Função para salvar o estado atual (rowData e totalInicial) no localStorage
        function saveLocalState() {
            // Garante que o rowData para a aba atual esteja atualizado antes de salvar
            rowData[currentTab] = gatherRows();
            localStorage.setItem(LOCAL_STORAGE_KEY_DATA, JSON.stringify(rowData));
            localStorage.setItem(LOCAL_STORAGE_KEY_TOTAL, document.getElementById("totalInicial").value);
        }

        // Função para carregar o estado salvo do localStorage
        function loadLocalState() {
            const savedData = localStorage.getItem(LOCAL_STORAGE_KEY_DATA);
            const savedTotal = localStorage.getItem(LOCAL_STORAGE_KEY_TOTAL);

            if (savedData) {
                try {
                    rowData = JSON.parse(savedData);
                    // Atualiza o totalInicial a partir do localStorage
                    if (savedTotal) {
                        document.getElementById("totalInicial").value = savedTotal;
                        totalInicial = parseInt(savedTotal);
                    }
                    buildGrid(rowData[currentTab] || []); // Constrói a grid com os dados da aba atual
                    setStatus("✓ Dados locais carregados");
                    return true; // Indica que carregou do local
                } catch (e) {
                    console.error("Erro ao carregar dados do localStorage:", e);
                    // Se houver erro no parsing, reseta e tenta do Sheets
                    localStorage.removeItem(LOCAL_STORAGE_KEY_DATA);
                    localStorage.removeItem(LOCAL_STORAGE_KEY_TOTAL);
                    return false;
                }
            }
            return false; // Indica que não havia dados locais
        }

        // ---- Tab switch ----
        function switchTab(tab) {
            // Save current tab state before switching
            rowData[currentTab] = gatherRows();

            currentTab = tab;
            document.getElementById("tab-diurno").classList.toggle("active", tab === "diurno");
            document.getElementById("tab-noturno").classList.toggle("active", tab === "noturno");
            buildGrid(rowData[tab] || []);
        }

        // ---- SetDriver: salva no localStorage e preenche todas as linhas ----
        function setDriver() {
            const atual = localStorage.getItem("driverName") || "";
            const val = prompt("Nome do Driver (salvo neste celular para sempre):", atual);
            if (val === null || val.trim() === "") return;
            localStorage.setItem("driverName", val.trim());
            applyDriver(val.trim());
            setStatus("✓ Driver '" + val.trim() + "' salvo neste celular!");
        }

        function applyDriver(name) {
            // Estampa driver apenas nas linhas que ja tem Saida preenchida
            document.querySelectorAll(".saida-input").forEach(inp => {
                const i = inp.dataset.index;
                const driverEl = document.getElementById(`driver-${i}`);
                if (driverEl && inp.value !== "") driverEl.textContent = name;
            });
        }

        function loadSavedDriver() {
            const saved = localStorage.getItem("driverName");
            if (saved) applyDriver(saved);
        }

        // ---- Status helper ----
        function setStatus(msg, ok = true) {
            const el = document.getElementById("status");
            el.textContent = msg;
            el.style.color = ok ? "#90e0ef" : "#ff6b6b";
            setTimeout(() => el.textContent = "", 3000);
        }

        // ---- Load from Google Sheets ----
        // --- Load from Google Sheets ---
        async function loadDataFromSheet() { // <-- AQUI!
            setStatus("Carregando...");
            const total = document.getElementById("totalInicial").value || 40;
            const url = `${SHEET_URL}?action=load&tab=${currentTab}&total=${total}`; // Notei que você adicionou total aqui, o que não é usado no GAS para load. Poderia ser removido.

            try {
                const res = await fetch(url);
                const json = await res.json();
                if (json.error) throw new Error(json.error);

                //... o restante da lógica de loadDataFromSheet...
                // Certifique-se que você tenha o bloco completo da função loadDataFromSheet
                // que te passei anteriormente, incluindo a atualização de rowData e saveLocalState().

                // Exemplo da parte importante:
                document.getElementById("totalInicial").value = json.totalInicial;
                totalInicial = parseInt(json.totalInicial);
                rowData[currentTab] = json.rows;
                buildGrid(rowData[currentTab]);
                setStatus("✓ Dados carregados");
                saveLocalState(); // Salva localmente após carregar do Sheets

            } catch (e) {
                setStatus("Erro ao carregar: " + e.message, false);
                console.error("Erro ao carregar dados da planilha:", e);
                // Em caso de erro ao carregar do Sheets, tenta carregar do local como fallback
                if (!loadLocalState()) {
                    setStatus("Erro de conexão com a planilha e não há dados locais.", false);
                }
            }
        }

        // --- Save to Google Sheets (GET para evitar CORS) ---
        async function saveDataToSheet() { // <-- AQUI!
            setStatus("Salvando...");
            rowData[currentTab] = gatherRows();
            const total = document.getElementById("totalInicial").value || 40;
            try {
                // Serializa as linhas como JSON encodado em query param
                const payload = encodeURIComponent(JSON.stringify(rowData[currentTab]));
                const url = `${SHEET_URL}?action=save&tab=${currentTab}&total=${total}&rows=${payload}`; // Use payload aqui
                const res = await fetch(url);
                const json = await res.json();
                if (json.error) throw new Error(json.error);
                setStatus("✓ Dados salvos com sucesso!");
                // Opcional: recarregar do Sheets após salvar para garantir o "Resto" atualizado
                // loadDataFromSheet(); 
            } catch (e) {
                setStatus("Erro ao salvar: " + e.message, false);
            }
        }
        // ---- Função de "Recarregar" do botão (que agora carregará do Sheets) ----
        // Renomeado para evitar conflito com a função de inicialização
        function handleReloadButtonClick() {
            loadDataFromSheet();
        }

        // ---- Init ----
        // Carrega o estado local na inicialização
        const hasLocalData = loadLocalState();

        // Se não houver dados locais ou se falhou ao carregar, tenta carregar do Sheets
        if (!hasLocalData) {
            loadDataFromSheet();
        }

        loadSavedDriver(); // Carrega o nome do driver salvo no localStorage

        // --- NOVO: Adiciona os event listeners SOMENTE após o DOM estar completamente carregado ---
        document.addEventListener('DOMContentLoaded', (event) => {
            // Associa os botões Salvar e Recarregar às novas funções
            const saveButton = document.querySelector(".btn-modif1");
            const reloadButton = document.querySelector(".btn-modif2");

            if (saveButton) {
                saveButton.onclick = saveDataToSheet; // Salvar
            } else {
                console.error("Botão 'Salvar' (.btn-modif1) não encontrado.");
            }

            if (reloadButton) {
                reloadButton.onclick = handleReloadButtonClick; // Recarregar
            } else {
                console.error("Botão 'Recarregar' (.btn-modif2) não encontrado.");
            }
        });
        // -----------------------------------------------------------------------------------------
    </script>
</body>

</html>
