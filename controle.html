<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Excursão</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            t
        }

        body {
            background: #0a0a0c;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .container {
            max-width: 480px;
            width: 100%;
            background: #1a1a1c;
            border-radius: 32px;
            padding: 24px 20px;
            border: 1px solid #2c2c2e;
        }

        h1 {
            color: #fff;
            font-size: 2rem;
            margin-bottom: 4px;
        }

        .subtitulo {
            color: #98989e;
            margin-bottom: 24px;
            border-bottom: 1px solid #2c2c2e;
            padding-bottom: 16px;
        }

        .total-inicial {
            display: flex;
            justify-content: space-between;
            background: #232325;
            padding: 16px 20px;
            border-radius: 40px;
            margin-bottom: 24px;
            border: 1px solid #3a3a3c;
        }

        .total-label {
            color: #fff;
        }

        .total-valor {
            background: #30d158;
            color: #000;
            font-size: 2rem;
            font-weight: 700;
            padding: 4px 24px;
            border-radius: 40px;
        }

        .monitora-header {
            display: flex;
            justify-content: space-between;
            background: #232325;
            padding: 12px 20px;
            border-radius: 40px;
            margin-bottom: 24px;
            border: 1px solid #3a3a3c;
        }

        .monitora-nome strong {
            color: #ffffff;
            font-size: 1.3rem;
        }

        .botao-alterar {
            background: #2c2c2e;
            border: 1px solid #3a3a3c;
            color: #98989e;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
        }

        .tabela-header {
            display: grid;
            grid-template-columns: 2fr 1fr 1.2fr 1.5fr;
            background: #2c2c2e;
            padding: 12px 16px;
            border-radius: 20px 20px 12px 12px;
            margin-bottom: 4px;
            border: 1px solid #3a3a3c;
        }

        .tabela-header span {
            color: #fff;
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .tabela-container {
            background: #1c1c1e;
            border-radius: 12px;
            border: 1px solid #3a3a3c;
            margin-bottom: 24px;
        }

        .linha-tabela {
            display: grid;
            grid-template-columns: 2fr 1fr 1.2fr 1.5fr;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #2c2c2e;
        }

        .familia {
            color: #fff;
        }

        .membros-input {
            background: #2c2c2e;
            border: 2px solid #3a3a3c;
            border-radius: 30px;
            padding: 8px;
            width: 70px;
            color: #fff;
            text-align: center;
        }

        .restante {
            color: #04f540;
        }

        .monitora {
            color: #98989e;
        }

        .botoes {
            display: flex;
            gap: 12px;
            margin: 20px 0;
        }

        .botao {
            flex: 1;
            background: #2c2c2e;
            border: 1px solid #3a3a3c;
            color: #fff;
            padding: 16px;
            border-radius: 40px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
        }

        .botao.salvar {
            background: #30d158;
            color: #000;
            border-color: #30d158;
        }

        .status {
            background: #1c1c1e;
            padding: 12px 16px;
            border-radius: 30px;
            border: 1px solid #2c2c2e;
            text-align: center;
            color: #98989e;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Controle de Excursão</h1>
        <div class="subtitulo">Gerenciamento de famílias</div>

        <div class="total-inicial">
            <span class="total-label">Total Inicial</span>
            <span class="total-valor" id="totalInicial">60</span>
        </div>

        <div class="monitora-header">
            <div class="monitora-nome">
                <strong id="nomeMonitoraDisplay">MARCIA</strong>
                <span>👤</span>
            </div>
            <div class="botao-alterar" onclick="alterarNome()">✏️ Alterar</div>
        </div>

        <div class="tabela-header">
            <span>FAMÍLIA</span>
            <span>MEMBROS</span>
            <span>RESTANTE</span>
            <span>MONITORA</span>
        </div>

        <div class="tabela-container" id="tabelaDados"></div>

        <div class="botoes">
            <button class="botao" onclick="carregarDados()">ATUALIZAR</button>
            <button class="botao salvar" onclick="salvarMembros()">SALVAR</button>
        </div>

        <div class="status" id="status">Pronto</div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzKg5Ts6vfFrhbtnO-wNy4UtsEpTzTIliWm1V3z-Ix2wgtyUJxYHOrdY-ZklEzjYQCiKQ/exec';

        let NOME_MONITORA = localStorage.getItem('monitora_nome') || 'MARCIA';
        document.getElementById('nomeMonitoraDisplay').textContent = NOME_MONITORA;

        function alterarNome() {
            const novoNome = prompt('Digite seu nome:', NOME_MONITORA);
            if (novoNome) {
                NOME_MONITORA = novoNome.toUpperCase();
                document.getElementById('nomeMonitoraDisplay').textContent = NOME_MONITORA;
                localStorage.setItem('monitora_nome', NOME_MONITORA);
            }
        }

        const dadosIniciais = [
            ['Souza', 4, 56, ''],
            ['Carvalho', 3, 53, ''],
            ['Silva', 1, 52, ''],
            ['Barros', 1, 51, ''],
            ['Carvalho', 1, 50, ''],
            ['Bezerra', 1, 49, '']
        ];

        function criarTabela(dados) {
            const container = document.getElementById('tabelaDados');
            container.innerHTML = '';
            dados.forEach((item, index) => {
                container.innerHTML += `
                    <div class="linha-tabela">
                        <span class="familia">${item[0]}</span>
                        <input class="membros-input" value="${item[1]}" data-index="${index}">
                        <span class="restante">${item[2]}</span>
                        <span class="monitora" id="monitora-${index}">${item[3] || ''}</span>
                    </div>
                `;
            });
        }

        async function carregarDados() {
            document.getElementById('status').innerHTML = '🔄 Carregando...';
            try {
                const response = await fetch(SCRIPT_URL);
                const result = await response.json();
                if (result.success && result.data) {
                    if (result.f1) document.getElementById('totalInicial').textContent = result.f1;
                    criarTabela(result.data);
                    document.getElementById('status').innerHTML = '✅ Atualizado';
                }
            } catch (error) {
                criarTabela(dadosIniciais);
            }
        }

        async function salvarMembros() {
            document.getElementById('status').innerHTML = '💾 Salvando...';

            const dados = [];
            document.querySelectorAll('.linha-tabela').forEach(linha => {
                dados.push([
                    linha.querySelector('.familia').textContent,
                    linha.querySelector('.membros-input').value,
                    linha.querySelector('.restante').textContent,
                    NOME_MONITORA
                ]);
            });

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        acao: 'atualizar_membros',
                        dados: dados,
                        monitora: NOME_MONITORA
                    })
                });
                document.getElementById('status').innerHTML = `✅ ${NOME_MONITORA} salvou!`;

                // Atualizar monitoras
                document.querySelectorAll('.linha-tabela').forEach((linha, index) => {
                    document.getElementById(`monitora-${index}`).textContent = NOME_MONITORA;
                });

            } catch (error) {
                document.getElementById('status').innerHTML = '❌ Erro';
            }
        }

        criarTabela(dadosIniciais);
    </script>
</body>

</html>
