<!DOCTYPE html>
<html lang="pt-BR">

<head>



    <meta http-equiv="refresh" content="1000">   
    <meta charset="UTF-8">
    <title>Exemplo Membros / Restante</title>
    <style>
        body {
            background: #000000;
            color: #eee;
            font-family: system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .card {
            background: #053d7d;
            padding: 20px;
            border-radius: 8px;
            width: 280px;
            box-shadow: 0 0 10px rgba(0, 0, 0, .6);
        }

        label,
        input,
        button {
            display: block;
            width: 100%;
            margin-bottom: 10px;
        }

        input {
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #444;
            background: #000;
            color: #eee;
        }

        button {
            padding: 10px;
            border: none;
            border-radius: 4px;
            background: #3b82f6;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
        }

        button:disabled {
            opacity: .6;
            cursor: default;
        }

        .resultado {
            margin-top: 10px;
            font-size: 1.1rem;
        }
    </style>
</head>

<body>
    <div class="card">
        <label for="membros">Quantidade de membros</label>
        <input id="membros" type="number" min="0" placeholder="Ex: 9">

        <button id="btn" onclick="enviar()">Calcular restante</button>

        <div class="resultado">
            Restante: <span id="restante">–</span>
        </div>
        <div class="resultado" id="msg" style="color:#f97373;"></div>
    </div>

    <script>
       const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycby9OQ1OKXJBF8fqoVl-9TvMVNXI0lBlqZy_DWNIMMvTb56qwnpLNWwFKnGviMqtb7GS2g/exec';
        async function enviar() {
            const input = document.getElementById('membros');
            const btn = document.getElementById('btn');
            const spanRestante = document.getElementById('restante');
            const msg = document.getElementById('msg');

            msg.textContent = '';
            const membros = Number(input.value);

            if (isNaN(membros)) {
                msg.textContent = 'Digite um valor válido.';
                return;
            }

            btn.disabled = true;

            try {
                const resp = await fetch(WEBAPP_URL, {
                    method: 'POST',
                    body: JSON.stringify({ membros })
                });

                const data = await resp.json();

                if (data.erro) {
                    msg.textContent = data.erro;
                    spanRestante.textContent = '–';
                } else {
                    spanRestante.textContent = data.restante;
                }
            } catch (e) {
                msg.textContent = 'Erro ao comunicar com o servidor.';
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>

</html>
